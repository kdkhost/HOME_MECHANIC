; Configuração PHP otimizada para CloudLinux + LiteSpeed + Imunify360
; HomeMechanic System

; Limites de memória e execução (CloudLinux compatível)
memory_limit = 256M
max_execution_time = 300
max_input_time = 300
max_input_vars = 3000

; Upload de arquivos
upload_max_filesize = 100M
post_max_size = 100M
file_uploads = On
max_file_uploads = 20

; Sessões (otimizado para LiteSpeed)
session.save_handler = files
session.gc_maxlifetime = 7200
session.cookie_lifetime = 0
session.cookie_secure = 1
session.cookie_httponly = 1
session.cookie_samesite = "Strict"

; Segurança (Imunify360 compatível)
expose_php = Off
allow_url_fopen = Off
allow_url_include = Off
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = error_log

; OPcache (LiteSpeed otimizado)
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 4000
opcache.revalidate_freq = 2
opcache.fast_shutdown = 1
opcache.validate_timestamps = 1

; Realpath cache (performance)
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; CloudLinux LVE compatível
; Estas configurações respeitam os limites do LVE
default_socket_timeout = 60
mysql.connect_timeout = 60
mysqli.default_socket_timeout = 60

; Timezone
date.timezone = "America/Sao_Paulo"

; Charset
default_charset = "UTF-8"

; Disable dangerous functions (Imunify360 security)
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,curl_exec,curl_multi_exec,parse_ini_file,show_source